name: Run Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'  # Use Node 20 so Web Streams (TransformStream) are available

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers and OS dependencies
        # Stagehand uses Playwright / puppeteer under the hood; install the browsers
        # and required OS deps so a local browser can be launched in CI.
        run: npx playwright install --with-deps

      - name: Run TypeScript tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}  # Use the secret
        run: npx tsx example-workflow.ts
