name: Run Stagehand Script  
  
on:  
  push:  
    branches: [ main ]  
  pull_request:  
    branches: [ main ]  
  workflow_dispatch:  
  
jobs:  
  run-stagehand:  
    runs-on: ubuntu-latest  
    env:  
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}  
      STAGEHAND_BROWSER_TARGET: local  
      STAGEHAND_SERVER_TARGET: local  
      HEADLESS: true  
  
    steps:  
      - name: Checkout repository  
        uses: actions/checkout@v4  
  
      - uses: ./.github/actions/setup-node-pnpm-turbo  
        with:  
          use-prebuilt-artifacts: "false"  
          node-version: "20.x"  
  
      - name: Run your Stagehand file  
        run: pnpm exec turbo run build && node example-workflow.js